[build]
# Use native CPU features for optimization
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
linker = "cc"

[profile.dev]
# Faster builds in development
opt-level = 0
debug = true

[profile.release]
# Maximum optimization for production
opt-level = 3
lto = true
codegen-units = 1
strip = true
